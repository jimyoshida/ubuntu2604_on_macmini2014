---
- name: General Agent Base Setup (SSH, Avahi)
  hosts: localhost
  connection: local
  gather_facts: yes
  become: yes

  vars:
    hostname: "{{ lookup('env', 'HOSTNAME') | default('ubuntu-vm.local') }}"
    avahi_interfaces: "{{ lookup('env', 'AVAHI_INTERFACES') | default('') }}"
    target_user: "{{ lookup('env', 'USER') }}"

  tasks:
    - name: 1. Update /etc/hosts with new hostname
      lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: "127.0.1.1 {{ hostname }}"
        state: present

    - name: 2. Set hostname
      hostname:
        name: "{{ hostname }}"

    - name: 3. Disable OS-level sleep/suspend (for headless operation)
      systemd:
        name: "{{ item }}"
        masked: yes
      loop:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target

    - name: 4. Install required system packages (SSH, Avahi, etc.)
      apt:
        name:
          - openssh-server
          - avahi-daemon
          - keychain
          - net-tools
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - macfanctld
          - lm-sensors
        state: present
        update_cache: yes

    - name: 5. Enable and start SSH service
      systemd:
        name: ssh
        enabled: yes
        state: started

    - name: 6. Configure SSH ClientAliveInterval
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 60'
      notify: restart ssh

    - name: 7. Configure SSH ClientAliveCountMax
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveCountMax'
        line: 'ClientAliveCountMax 720'
      notify: restart ssh

    - name: 8. Enable and start macfanctld service
      systemd:
        name: macfanctld
        enabled: yes
        state: started

    - name: 9. Configure systemd logind to ignore idle and lid actions
      lineinfile:
        path: /etc/systemd/logind.conf
        regexp: "^#?{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: "IdleAction", value: "ignore" }
        - { key: "LidSwitchIgnoreInhibited", value: "no" }
        - { key: "HandleLidSwitch", value: "ignore" }
        - { key: "HandleLidSwitchExternalPower", value: "ignore" }
        - { key: "HandleLidSwitchDocked", value: "ignore" }

    - name: 10. Configure Avahi daemon (allow-interfaces)
      lineinfile:
        path: /etc/avahi/avahi-daemon.conf
        regexp: '^#?allow-interfaces='
        line: "allow-interfaces={{ avahi_interfaces }}"
      when: avahi_interfaces != ""
      notify: restart avahi

    - name: 11. Enable and start Avahi service
      systemd:
        name: avahi-daemon
        enabled: yes
        state: started

    - name: 12. Enable and start systemd-resolved service
      systemd:
        name: systemd-resolved
        enabled: yes
        state: started

    - name: 13. Disable screen blanking/sleep (X11 settings)
      become: no
      copy:
        dest: "{{ item }}"
        content: |
          # Disable automatic screen blanking
          xset s off
          xset -dpms
        mode: '0644'
      loop:
        - ~/.xprofile
        - ~/.xsessionrc

    - name: 14. Disable GNOME screen lock and power management
      become: no
      shell: |
        gsettings set org.gnome.desktop.screensaver lock-enabled false
        gsettings set org.gnome.desktop.session idle-delay 0
        gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-ac-timeout 0
        gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-ac-type 'nothing'
      ignore_errors: yes

    - name: 15. Add keychain initialization to .bashrc
      become: no
      blockinfile:
        path: ~/.bashrc
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK (keychain)"
        content: |
          keychain $HOME/.ssh/id_rsa
          source $HOME/.keychain/`hostname`-sh

    - name: 16. Add systemctl alias to .bashrc
      become: no
      blockinfile:
        path: ~/.bashrc
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK (systemctl-alias)"
        block: |
          alias s=systemctl

    - name: 17. Add git prompt function to .bashrc
      become: no
      blockinfile:
        path: ~/.bashrc
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK (git-prompt)"
        block: |
          # git prompt function
          parse_git_branch() {
            git branch 2> /dev/null | sed -e '/^[^*]/d' -e 's/* \(.*\)/(\1)/'
          }
          PS1="\[\e]0;\u@\h: \w\a\]${debian_chroot:+($debian_chroot)}\[\033[01;32m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[33m\] \$(parse_git_branch)\[\033[00m\]$ "

  handlers:
    - name: restart logind
      systemd:
        name: systemd-logind
        state: restarted

    - name: restart avahi
      systemd:
        name: avahi-daemon
        state: restarted

    - name: restart ssh
      systemd:
        name: ssh
        state: restarted
