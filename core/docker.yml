---
- name: Docker Setup
  hosts: localhost
  connection: local
  gather_facts: yes
  become: yes

  vars:
    target_user: "{{ lookup('env', 'USER') }}"

  tasks:
    - name: 1. Create directory for Docker keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 2. Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: yes

    - name: 3. Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present

    - name: 4. Install Docker related packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: 5. Add user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: yes

    - name: 6. Add container access permission to X server in .bashrc
      become: no
      lineinfile:
        path: ~/.bashrc
        line: "xhost +local:docker >/dev/null 2>&1 || true"
        create: yes
