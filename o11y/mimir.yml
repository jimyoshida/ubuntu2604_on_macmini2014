---
- name: Install Grafana Mimir
  hosts: localhost
  connection: local
  gather_facts: no
  become: yes

  tasks:
    - name: 1. Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - curl
        state: present
        update_cache: yes

    - name: 2. Download and dearmor Grafana GPG key
      shell: curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor -o /usr/share/keyrings/grafana.gpg
      args:
        creates: /usr/share/keyrings/grafana.gpg

    - name: 3. Set permissions on Grafana keyring
      file:
        path: /usr/share/keyrings/grafana.gpg
        mode: '0644'

    - name: 4. Add Grafana repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main"
        state: present
        filename: grafana
        update_cache: yes

    - name: 5. Install Mimir
      apt:
        name: mimir
        state: present
        update_cache: yes

    - name: 6. Configure Mimir for single-node deployment
      copy:
        dest: /etc/mimir/config.yml
        content: |
          server:
            http_listen_port: 9009
            grpc_listen_port: 9095

          common:
            storage:
              backend: filesystem
              filesystem:
                dir: /var/lib/mimir

          ingester:
            ring:
              replication_factor: 1

          blocks_storage:
            filesystem:
              dir: /var/lib/mimir/blocks

          compactor:
            data_dir: /var/lib/mimir/compactor

          limits:
            compactor_blocks_retention_period: 30d

          ruler_storage:
            filesystem:
              dir: /var/lib/mimir/rules
        owner: mimir
        group: mimir
        mode: '0644'
      notify: Restart Mimir

    - name: 7. Enable and start Mimir service
      systemd:
        name: mimir
        enabled: yes
        state: started

  handlers:
    - name: Restart Mimir
      systemd:
        name: mimir
        state: restarted
