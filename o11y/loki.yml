---
- name: Install Grafana Loki
  hosts: localhost
  connection: local
  gather_facts: no
  become: yes

  tasks:
    - name: 1. Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - curl
        state: present
        update_cache: yes

    - name: 2. Download and dearmor Grafana GPG key
      shell: curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor -o /usr/share/keyrings/grafana.gpg
      args:
        creates: /usr/share/keyrings/grafana.gpg

    - name: 3. Set permissions on Grafana keyring
      file:
        path: /usr/share/keyrings/grafana.gpg
        mode: '0644'

    - name: 4. Add Grafana repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main"
        state: present
        filename: grafana
        update_cache: yes

    - name: 5. Install Loki
      apt:
        name: loki
        state: present
        update_cache: yes

    - name: 6. Set HTTP and gRPC listen ports
      lineinfile:
        path: /etc/loki/config.yml
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "http_listen_port:", line: "  http_listen_port: 3100" }
        - { regexp: "grpc_listen_port:", line: "  grpc_listen_port: 9096" }
      notify: Restart Loki

    - name: 7. Enable and start Loki service
      systemd:
        name: loki
        enabled: yes
        state: started

  handlers:
    - name: Restart Loki
      systemd:
        name: loki
        state: restarted
