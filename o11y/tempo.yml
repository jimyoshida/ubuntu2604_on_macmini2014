---
- name: Install Grafana Tempo
  hosts: localhost
  connection: local
  gather_facts: no
  become: yes

  tasks:
    - name: 1. Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - curl
        state: present
        update_cache: yes

    - name: 2. Download and dearmor Grafana GPG key
      shell: curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor -o /usr/share/keyrings/grafana.gpg
      args:
        creates: /usr/share/keyrings/grafana.gpg

    - name: 3. Set permissions on Grafana keyring
      file:
        path: /usr/share/keyrings/grafana.gpg
        mode: '0644'

    - name: 4. Add Grafana repository
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/grafana.gpg] https://apt.grafana.com stable main"
        state: present
        filename: grafana
        update_cache: yes

    - name: 5. Install Tempo
      apt:
        name: tempo
        state: present
        update_cache: yes

    - name: 6. Set HTTP listen port
      lineinfile:
        path: /etc/tempo/config.yml
        regexp: "http_listen_port:"
        line: "  http_listen_port: 3200"
      notify: Restart Tempo

    - name: 7. Set gRPC port to avoid conflict with Mimir (9095) and Loki (9096)
      lineinfile:
        path: /etc/tempo/config.yml
        insertafter: "http_listen_port:"
        line: "  grpc_listen_port: 9097"
        regexp: "grpc_listen_port:"
      notify: Restart Tempo

    - name: 8. Enable and start Tempo service
      systemd:
        name: tempo
        enabled: yes
        state: started

  handlers:
    - name: Restart Tempo
      systemd:
        name: tempo
        state: restarted
