---
- name: Install Azure CLI
  hosts: localhost
  connection: local
  gather_facts: yes
  become: yes

  tasks:
    - name: 1. Install prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: 2. Create directory for apt keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: 3. Download and dearmor Microsoft signing key
      shell: curl -sL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg
      args:
        creates: /etc/apt/keyrings/microsoft.gpg

    - name: 4. Add Azure CLI software repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/azure-cli/ {{ ansible_distribution_release }} main"
        state: present
        filename: azure-cli
        update_cache: yes

    - name: 5. Install Azure CLI
      apt:
        name: azure-cli
        state: present
        update_cache: yes