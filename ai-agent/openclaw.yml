- name: Setup OpenClaw Agent
  hosts: localhost
  connection: local
  vars_prompt:
    - name: slack_app_token
      prompt: "Enter Slack App Token (xapp-...): [Press Enter to skip]"
      private: no
      default: ""
    - name: slack_bot_token
      prompt: "Enter Slack Bot Token (xoxb-...): [Press Enter to skip]"
      private: yes
      default: ""

  vars:
    current_user: "{{ lookup('env', 'USER') }}"
    openclaw_config_dir: "/home/{{ current_user }}/.openclaw"

  tasks:
    - name: 1. Check if nvm is installed
      stat:
        path: "/home/{{ current_user }}/.nvm/nvm.sh"
      register: nvm_installed

    - name: 2. Fail if nvm/Node.js is not installed
      fail:
        msg: "nvm/Node.js is not installed. Please run nvm.yml playbook first."
      when: not nvm_installed.stat.exists

    - name: 3. Check Node.js version
      shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        node --version
      args:
        executable: /bin/bash
      register: node_version
      changed_when: false

    - name: 4. Install OpenClaw globally via npm
      shell: |
        export NVM_DIR="$HOME/.nvm"
        [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
        npm install -g openclaw@latest
      args:
        executable: /bin/bash

    - name: 5. Create OpenClaw config directory
      file:
        path: "{{ openclaw_config_dir }}"
        state: directory
        mode: '0755'

    - name: 6. Create environment file for Slack tokens
      copy:
        dest: "/home/{{ current_user }}/.openclaw.env"
        content: |
          export DISPLAY=:0
          export SLACK_APP_TOKEN={{ slack_app_token if slack_app_token != "" else "xapp-..." }}
          export SLACK_BOT_TOKEN={{ slack_bot_token if slack_bot_token != "" else "xoxb-..." }}
        mode: '0600'

    - name: 7. Add .openclaw.env to .bashrc
      blockinfile:
        path: "/home/{{ current_user }}/.bashrc"
        marker: "# {mark} ANSIBLE MANAGED BLOCK: openclaw"
        block: |
          # openclaw
          [ -f ~/.openclaw.env ] && source ~/.openclaw.env
        create: true
        mode: '0644'

    - name: 8. Print instructions
      block:
        - name: Print OpenClaw setup summary
          debug:
            msg:
              - "OpenClaw setup is complete."
              - ""
              - "User: {{ current_user }}"
              - "Installation: npm global package (openclaw@latest)"
              - "Config directory: {{ openclaw_config_dir }}"

        - name: Print Slack tokens configured section
          debug:
            msg:
              - ""
              - "Slack tokens have been configured in /home/{{ current_user }}/.openclaw.env"
              - ""
              - "Next steps (manual onboarding required):"
              - "  1. Open a new shell and install OpenClaw daemon:"
              - "     openclaw onboard --install-daemon"
              - ""
              - "  2. Enable systemd lingering:"
              - "     sudo loginctl enable-linger {{ current_user }}"
              - ""
              - "After onboarding:"
              - "  To start: systemctl --user start openclaw-gateway"
              - "  To check status: systemctl --user status openclaw-gateway"
              - "  To view logs: journalctl --user -u openclaw-gateway -f"
              - "  To stop: systemctl --user stop openclaw-gateway"
              - ""
              - "OpenClaw CLI usage:"
              - "  openclaw gateway --port 18789 --verbose"
              - "  openclaw message send --target <number> --message \"Hello\""
              - "  openclaw agent --message \"Your query\" --thinking high"
          when: slack_app_token != "" and slack_bot_token != ""

        - name: Print no Slack tokens section
          debug:
            msg:
              - ""
              - "No Slack tokens provided. Manual onboarding required:"
              - "  1. Edit /home/{{ current_user }}/.openclaw.env with your tokens:"
              - "     export SLACK_APP_TOKEN=xapp-..."
              - "     export SLACK_BOT_TOKEN=xoxb-..."
              - ""
              - "  2. Open a new shell and install OpenClaw daemon:"
              - "     openclaw onboard --install-daemon"
              - ""
              - "  3. Enable systemd lingering:"
              - "     sudo loginctl enable-linger {{ current_user }}"
              - ""
              - "Manual usage (without daemon):"
              - "  openclaw gateway --port 18789 --verbose"
          when: slack_app_token == "" or slack_bot_token == ""

        - name: Print final instructions
          debug:
            msg:
              - ""
              - "Documentation: https://docs.openclaw.ai/"
              - "Updating: npm update -g openclaw"
